<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    .carousel {
      width: 100vw;
      overflow: hidden;
      position: relative;
      touch-action: pan-y;
    }

    .track {
      display: flex;
      gap: 12px;
      will-change: transform;
    }

    .slide {
      flex: 0 0 100vw;
      width: 100vw;
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="track" id="track">
      <div class="slide"><img src="images/Slide1.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide2.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide3.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide4.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide5.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide6.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide7.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide8.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide9.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide10.jpg" alt=""></div>
    </div>
  </div>

  <script>
    const carousel = document.getElementById("carousel");
    const track = document.getElementById("track");

    const gap = 12;
    const totalSlides = 10;

    let index = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function stepWidth() {
      return window.innerWidth + gap;
    }

    function baseOffset() {
      return -(index * stepWidth());
    }

    function setX(x, animate = false) {
      track.style.transition = animate ? "transform 0.25s ease" : "none";
      track.style.transform = `translate3d(${x}px, 0, 0)`;
    }

    function snapToCurrent(animate = true) {
      setX(baseOffset(), animate);
    }

    carousel.addEventListener("pointerdown", (e) => {
      isDragging = true;
      startX = e.clientX;
      currentX = e.clientX;
      track.style.transition = "none";
      carousel.setPointerCapture(e.pointerId);
    });

    carousel.addEventListener("pointermove", (e) => {
      if (!isDragging) return;

      currentX = e.clientX;
      const dx = currentX - startX;
      setX(baseOffset() + dx, false);
    });

    function endDrag() {
      if (!isDragging) return;
      isDragging = false;

      const dx = currentX - startX;
      const threshold = 50;

      if (dx < -threshold) {
        index = (index + 1) % totalSlides;
      } else if (dx > threshold) {
        index = (index - 1 + totalSlides) % totalSlides;
      }

      snapToCurrent(true);
    }

    carousel.addEventListener("pointerup", endDrag);
    carousel.addEventListener("pointercancel", endDrag);
    carousel.addEventListener("lostpointercapture", endDrag);

    window.addEventListener("resize", () => {
      snapToCurrent(false);
    });

    snapToCurrent(false);
  </script>

</body>
</html>
