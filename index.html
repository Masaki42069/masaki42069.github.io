<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIP S.C.</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: "Times New Roman", Times, serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #tombstone {
      position: absolute;
      width: 45px;
      height: 55px;
      pointer-events: none;
      user-select: none;
      will-change: transform;
    }

    #tombstone svg {
      width: 100%;
      height: 100%;
    }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
    }

    #fasterBtn {
      font-family: "Times New Roman", Times, serif;
      font-size: 22px;
      padding: 6px 16px;
      background: transparent;
      color: white;
      border: 1px solid white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="screen">
    <div id="tombstone">
      <svg viewBox="0 0 90 110">
        <path
          d="M10 105 L10 40
             C10 16, 24 5, 45 5
             C66 5, 80 16, 80 40
             L80 105 Z"
          fill="#bdbdbd"
          stroke="#7a7a7a"
          stroke-width="2"
        />
        <text x="45" y="50" text-anchor="middle" font-size="16" fill="#111">RIP</text>
	<text x="45" y="72" text-anchor="middle" font-size="16" fill="#111">S.C.</text>
      </svg>
    </div>

    <div id="controls">
      <button id="fasterBtn">faster</button>
    </div>
  </div>

  <script>
    const tombstone = document.getElementById("tombstone");
    const fasterBtn = document.getElementById("fasterBtn");

    let x = 120;
    let y = 80;

    let speed = 4;
    const speedMultiplier = 1.5;
    const maxSpeed = 550;

    let angle = Math.PI / 3.7;
    let dx = Math.cos(angle) * speed;
    let dy = Math.sin(angle) * speed;

    function applySpeed() {
      const a = Math.atan2(dy, dx);
      dx = Math.cos(a) * speed;
      dy = Math.sin(a) * speed;
    }

    fasterBtn.addEventListener("click", () => {
      speed = Math.min(speed * speedMultiplier, maxSpeed);
      applySpeed();
    });

    function animate() {
      const rect = tombstone.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width;
      const maxY = window.innerHeight - rect.height;

      x += dx;
      y += dy;

      if (x < 0 || x > maxX) {
        dx *= -1;
        x = Math.max(0, Math.min(x, maxX));
      }

      if (y < 0 || y > maxY) {
        dy *= -1;
        y = Math.max(0, Math.min(y, maxY));
      }

      tombstone.style.transform = `translate(${x}px, ${y}px)`;
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
