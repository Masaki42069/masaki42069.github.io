<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
}

.carousel{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  width:100vw;
}

.carousel::-webkit-scrollbar{
  display:none;
}

.carousel img{
  width:100vw;
  flex:0 0 100vw;
  scroll-snap-align:start;
  display:block;
}

</style>

</head>

<body>

<div class="carousel" id="carousel"></div>

<script>

const imageCount = 10;
const carousel = document.getElementById("carousel");

/* create array of image numbers */
let slides = [];
for(let i=1;i<=imageCount;i++){
  slides.push(i);
}

/* shuffle order */
slides.sort(()=>Math.random()-0.5);

/* create images */
slides.forEach(num=>{
  const img=document.createElement("img");
  img.src=`images/Slide${num}.jpg`;
  carousel.appendChild(img);
});

/* block multi-slide flicking */
let startIndex = 0;
const gap = 10;

function step(){
  return window.innerWidth + gap;
}

function getIndex(){
  return Math.round(carousel.scrollLeft / step());
}

function goTo(index){
  carousel.scrollTo({
    left:index*step(),
    behavior:"smooth"
  });
}

carousel.addEventListener("touchstart",()=>{
  startIndex=getIndex();
},{passive:true});

carousel.addEventListener("touchend",()=>{

  let current=getIndex();

  /* allow only one slide movement */
  if(current>startIndex+1) current=startIndex+1;
  if(current<startIndex-1) current=startIndex-1;

  /* stop at first/last slide (no loop) */
  if(current<0) current=0;
  if(current>imageCount-1) current=imageCount-1;

  goTo(current);

},{passive:true});

</script>

</body>
</html>
