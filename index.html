<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      touch-action: pan-y;
    }

    .carousel {
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .track {
      display: flex;
      gap: 12px;
      will-change: transform;
    }

    .slide {
      width: 100vw;
      flex: 0 0 100vw;
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="track" id="track">
      <div class="slide"><img src="images/Slide1.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide2.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide3.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide4.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide5.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide6.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide7.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide8.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide9.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide10.jpg" alt=""></div>
    </div>
  </div>

  <script>
    const track = document.getElementById("track");
    const gap = 12;
    const totalSlides = 10;

    let index = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function slideWidth() {
      return window.innerWidth + gap;
    }

    function setTranslate(x, animate = false) {
      track.style.transition = animate ? "transform 0.28s ease" : "none";
      track.style.transform = `translateX(${x}px)`;
    }

    function snapToIndex(animate = true) {
      const baseX = -(index * slideWidth());
      setTranslate(baseX, animate);
    }

    track.addEventListener("touchstart", (e) => {
      isDragging = true;
      startX = e.touches[0].clientX;
      currentX = startX;
      track.style.transition = "none";
    }, { passive: true });

    track.addEventListener("touchmove", (e) => {
      if (!isDragging) return;

      currentX = e.touches[0].clientX;
      const dx = currentX - startX;
      const baseX = -(index * slideWidth());

      setTranslate(baseX + dx, false);
    }, { passive: true });

    track.addEventListener("touchend", () => {
      if (!isDragging) return;
      isDragging = false;

      const dx = currentX - startX;
      const threshold = 50;

      if (dx < -threshold) {
        index = (index + 1) % totalSlides;
      } else if (dx > threshold) {
        index = (index - 1 + totalSlides) % totalSlides;
      }

      snapToIndex(true);
    });

    track.addEventListener("touchcancel", () => {
      isDragging = false;
      snapToIndex(true);
    });

    window.addEventListener("resize", () => {
      snapToIndex(false);
    });

    snapToIndex(false);
  </script>

</body>
</html>
