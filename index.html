<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      touch-action: pan-y;
    }

    .carousel {
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .track {
      display: flex;
      gap: 12px;
      transition: transform 0.28s ease;
      will-change: transform;
    }

    .slide {
      width: 100vw;
      flex: 0 0 100vw;
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="track" id="track">
      <div class="slide"><img src="images/Slide1.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide2.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide3.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide4.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide5.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide6.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide7.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide8.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide9.jpg" alt=""></div>
      <div class="slide"><img src="images/Slide10.jpg" alt=""></div>
    </div>
  </div>

  <script>
    const track = document.getElementById("track");
    const gap = 12;
    const totalSlides = 10;

    let index = 0;
    let startX = 0;
    let endX = 0;

    function updateCarousel(animated = true) {
      track.style.transition = animated ? "transform 0.28s ease" : "none";
      const offset = index * (window.innerWidth + gap);
      track.style.transform = `translateX(-${offset}px)`;
    }

    function nextSlide() {
      index = (index + 1) % totalSlides;
      updateCarousel(true);
    }

    function prevSlide() {
      index = (index - 1 + totalSlides) % totalSlides;
      updateCarousel(true);
    }

    track.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      endX = startX;
    }, { passive: true });

    track.addEventListener("touchmove", (e) => {
      endX = e.touches[0].clientX;
    }, { passive: true });

    track.addEventListener("touchend", () => {
      const dx = endX - startX;
      const threshold = 40;

      if (dx <= -threshold) {
        nextSlide();
      } else if (dx >= threshold) {
        prevSlide();
      } else {
        updateCarousel(true);
      }
    });

    window.addEventListener("resize", () => {
      updateCarousel(false);
    });

    updateCarousel(false);
  </script>

</body>
</html>
