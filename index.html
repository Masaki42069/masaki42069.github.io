<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      overflow-x: hidden;
    }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      width: 100vw;
    }

    .carousel img {
      width: 100vw;
      height: auto;
      flex-shrink: 0;
      scroll-snap-align: start;
      display: block;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel {
      scrollbar-width: none;
    }
  </style>
</head>
<body>

  <div class="carousel">
    <img src="images/Slide1.jpg" alt="Slide 1">
    <img src="images/Slide2.jpg" alt="Slide 2">
    <img src="images/Slide3.jpg" alt="Slide 3">
    <img src="images/Slide4.jpg" alt="Slide 4">
    <img src="images/Slide5.jpg" alt="Slide 5">
    <img src="images/Slide6.jpg" alt="Slide 6">
    <img src="images/Slide7.jpg" alt="Slide 7">
    <img src="images/Slide8.jpg" alt="Slide 8">
    <img src="images/Slide9.jpg" alt="Slide 9">
    <img src="images/Slide10.jpg" alt="Slide 10">
  </div>

</body>
</html>
